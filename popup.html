<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>VPL Paste Enabler</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0e1a;
      --bg2: #111827;
      --bg3: #1a2236;
      --border: rgba(255,255,255,0.07);
      --border-active: rgba(99,179,237,0.3);
      --text: #e2e8f0;
      --muted: #64748b;
      --accent: #3b82f6;
      --accent2: #60a5fa;
      --green: #22c55e;
      --orange: #f97316;
      --red: #ef4444;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Inter', system-ui, sans-serif;
    }

    html, body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 13px;
      min-height: 420px;
    }

    body { padding: 0; overflow: hidden; }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(59,130,246,0.06) 0%, transparent 100%);
    }

    .logo {
      width: 32px; height: 32px;
      background: linear-gradient(135deg, #1d4ed8, #3b82f6);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(59,130,246,0.3);
    }

    .header-info { flex: 1; }
    .header-title {
      font-size: 13px;
      font-weight: 600;
      color: #fff;
      letter-spacing: -0.2px;
    }
    .header-sub {
      font-size: 10px;
      color: var(--muted);
      font-family: var(--mono);
      margin-top: 1px;
    }

    .badge {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      font-family: var(--mono);
      letter-spacing: 0.3px;
      flex-shrink: 0;
    }
    .badge .dot { width: 6px; height: 6px; border-radius: 50%; }
    .badge.active { background: rgba(34,197,94,0.12); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .badge.active .dot { background: var(--green); box-shadow: 0 0 6px var(--green); animation: pulse 2s ease-in-out infinite; }
    .badge.disabled { background: rgba(239,68,68,0.1); color: var(--red); border: 1px solid rgba(239,68,68,0.2); }
    .badge.disabled .dot { background: var(--red); }

    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

    /* ── Body ── */
    .body { padding: 12px; display: flex; flex-direction: column; gap: 10px; }

    /* ── Status card ── */
    .status-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      transition: border-color 0.2s;
    }
    .status-card.typing-active { border-color: rgba(249,115,22,0.3); }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mode-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 4px;
    }

    .mode-text {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .speed-badge {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--accent2);
      background: rgba(59,130,246,0.1);
      border: 1px solid rgba(59,130,246,0.15);
      padding: 2px 7px;
      border-radius: 4px;
    }

    /* Progress */
    .progress-wrap { margin-top: 10px; display: none; }
    .progress-wrap.show { display: block; }
    .progress-track {
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 999px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #3b82f6, #60a5fa);
      border-radius: 999px;
      width: 0%;
      transition: width 0.12s linear;
    }
    .progress-meta {
      display: flex;
      justify-content: space-between;
      margin-top: 5px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    /* ── Auto-Typer card ── */
    .auto-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .card-label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      font-weight: 600;
      margin-bottom: 10px;
    }

    .btn-start {
      width: 100%;
      height: 40px;
      background: linear-gradient(135deg, #2563eb, #3b82f6);
      border: 1px solid rgba(99,179,237,0.2);
      border-radius: 8px;
      color: #fff;
      font-family: var(--sans);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      transition: all 0.15s;
      letter-spacing: -0.1px;
      box-shadow: 0 4px 12px rgba(37,99,235,0.25);
    }
    .btn-start:hover { filter: brightness(1.1); box-shadow: 0 4px 16px rgba(37,99,235,0.4); }
    .btn-start:active { transform: scale(0.98); }

    .btn-cancel {
      width: 100%;
      height: 36px;
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      border-radius: 8px;
      color: #fca5a5;
      font-family: var(--sans);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 7px;
      display: none;
      transition: all 0.15s;
    }
    .btn-cancel.show { display: block; }
    .btn-cancel:hover { background: rgba(239,68,68,0.18); border-color: rgba(239,68,68,0.35); }

    /* Speed pills */
    .speed-section { margin-top: 10px; }
    .speed-label-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 7px;
    }
    .speed-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.6px; font-weight: 600; }
    .speed-val { font-family: var(--mono); font-size: 11px; color: var(--accent2); }

    .pills {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 5px;
    }

    .pill {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 7px 4px;
      border-radius: 7px;
      font-family: var(--mono);
      font-size: 10px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
      line-height: 1.2;
    }
    .pill:hover { color: var(--text); border-color: rgba(255,255,255,0.15); }
    .pill.active {
      background: rgba(59,130,246,0.15);
      border-color: rgba(59,130,246,0.35);
      color: var(--accent2);
    }
    .pill .pill-name { font-size: 9px; color: inherit; }
    .pill .pill-ms { font-size: 10px; font-weight: 600; margin-top: 1px; }

    .custom-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 7px;
    }
    .custom-row label {
      font-size: 10px;
      color: var(--muted);
      white-space: nowrap;
      flex-shrink: 0;
    }
    .custom-input {
      flex: 1;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      padding: 5px 8px;
      outline: none;
      transition: border-color 0.15s;
    }
    .custom-input:focus { border-color: var(--border-active); }
    .custom-input::placeholder { color: var(--muted); }

    /* ── Shortcuts ── */
    .shortcut-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
    }

    .shortcut-rows { display: flex; flex-direction: column; gap: 5px; }
    .sc-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 11px;
      color: var(--muted);
    }
    .sc-row .sc-label { color: var(--text); font-size: 11px; }
    .sc-keys { display: flex; gap: 3px; align-items: center; }
    kbd {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-bottom: 2px solid rgba(0,0,0,0.3);
      padding: 1px 5px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text);
    }

    /* ── Footer ── */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px 10px;
      border-top: 1px solid var(--border);
    }
    .footer-left { font-size: 10px; color: var(--muted); font-family: var(--mono); }
    .settings-link {
      font-size: 11px;
      color: var(--accent2);
      cursor: pointer;
      background: none;
      border: none;
      font-family: var(--sans);
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      transition: color 0.15s;
    }
    .settings-link:hover { color: #fff; }

    /* ── Randomize row ── */
    .randomize-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 7px 10px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 7px;
    }
    .randomize-info {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--muted);
    }
    .randomize-sub { color: var(--accent2); font-family: var(--mono); font-size: 10px; }

    /* ── Mini toggle ── */
    .mini-toggle { position: relative; width: 32px; height: 18px; flex-shrink: 0; }
    .mini-toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
    .mini-track {
      position: absolute; inset: 0;
      background: var(--bg4);
      border: 1px solid var(--border);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .mini-track::after {
      content: '';
      position: absolute;
      width: 12px; height: 12px;
      left: 2px; top: 2px;
      background: var(--muted);
      border-radius: 50%;
      transition: all 0.2s;
    }
    .mini-toggle input:checked + .mini-track { background: var(--accent); border-color: rgba(59,130,246,0.5); }
    .mini-toggle input:checked + .mini-track::after { transform: translateX(14px); background: #fff; }

    /* typing dots */
    .typing-dots::after {
      content: '';
      animation: dots 1.2s steps(4, end) infinite;
    }
    @keyframes dots {
      0%,20%{content:''} 40%{content:'.'} 60%{content:'..'} 80%,100%{content:'...'}
    }
  </style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
      <rect x="5" y="3" width="14" height="18" rx="2" fill="rgba(255,255,255,0.9)"/>
      <rect x="9" y="2" width="6" height="3" rx="1" fill="rgba(255,255,255,0.5)"/>
      <path d="M13 8L9 14h3l-1 4 4-6h-3l1-4z" fill="#fbbf24"/>
    </svg>
  </div>
  <div class="header-info">
    <div class="header-title">VPL Paste Enabler</div>
    <div class="header-sub">v3.0 · Ace Editor bypass</div>
  </div>
  <div id="status-badge" class="badge active">
    <div class="dot"></div>
    Active
  </div>
</div>

<div class="body">

  <!-- Status -->
  <div class="status-card" id="status-card">
    <div class="mode-label">Current Mode</div>
    <div class="status-row">
      <div class="mode-text" id="mode-text">Paste Bypass</div>
      <div class="speed-badge" id="speed-text">75 ms/ch</div>
    </div>
    <div class="progress-wrap" id="progress">
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>
      <div class="progress-meta">
        <span id="progress-label">0 / 0 chars</span>
        <span id="progress-pct">0%</span>
      </div>
    </div>
  </div>

  <!-- Auto-Typer -->
  <div class="auto-card">
    <div class="card-label">Auto-Typer</div>

    <button class="btn-start" id="start-btn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
      Start Auto-Typer
    </button>
    <button class="btn-cancel" id="cancel-btn">⛔ Stop Typing</button>

    <div class="speed-section">
      <div class="speed-label-row">
        <span class="speed-label">Typing Speed</span>
        <span class="speed-val" id="speed-text-detail">75 ms/char</span>
      </div>
      <div class="pills">
        <button class="pill" data-speed="10">
          <div class="pill-name">Ultra</div>
          <div class="pill-ms">10ms</div>
        </button>
        <button class="pill" data-speed="30">
          <div class="pill-name">Fast</div>
          <div class="pill-ms">30ms</div>
        </button>
        <button class="pill active" data-speed="75">
          <div class="pill-name">Medium</div>
          <div class="pill-ms">75ms</div>
        </button>
        <button class="pill" data-speed="150">
          <div class="pill-name">Slow</div>
          <div class="pill-ms">150ms</div>
        </button>
      </div>
      <div class="custom-row">
        <label>Custom:</label>
        <input class="custom-input" type="number" id="custom-speed" min="1" max="2000" placeholder="ms/char" />
      </div>
      <div class="randomize-row">
        <div class="randomize-info">
          <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="flex-shrink:0;opacity:0.5"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
          <span>Randomize <span class="randomize-sub">±20% per key</span></span>
        </div>
        <label class="mini-toggle">
          <input type="checkbox" id="randomize-speed-popup" />
          <span class="mini-track"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Shortcuts -->
  <div class="shortcut-card">
    <div class="card-label">Keyboard Shortcuts</div>
    <div class="shortcut-rows">
      <div class="sc-row">
        <span class="sc-label">Paste</span>
        <div class="sc-keys">
          <kbd>Ctrl</kbd><span style="color:var(--muted);font-size:10px">+</span><kbd>V</kbd>
        </div>
      </div>
      <div class="sc-row">
        <span class="sc-label">Auto-Type</span>
        <div class="sc-keys">
          <kbd>Ctrl</kbd><span style="color:var(--muted);font-size:10px">+</span><kbd>Shift</kbd><span style="color:var(--muted);font-size:10px">+</span><kbd>T</kbd>
        </div>
      </div>
      <div class="sc-row">
        <span class="sc-label">Cancel</span>
        <div class="sc-keys"><kbd>Esc</kbd></div>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  <span class="footer-left">All pages · All frames</span>
  <button class="settings-link" id="open-options">
    <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    Settings
  </button>
</div>

<script src="content.js"></script>
</body>
</html>
